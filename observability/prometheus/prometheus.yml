global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'archAIc-services'
    static_configs:
      - targets: 
        - 'auth-service:8001'
        - 'db-service:8002'
        - 'product-service:8003'
