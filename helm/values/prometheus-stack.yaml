# ── Prometheus Stack Helm Values ──────────────────────────────────────────────
# Chart: prometheus-community/kube-prometheus-stack

prometheus:
  prometheusSpec:
    # Allow scraping from the 'archaics' namespace
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    
    # Generic pod scraping via annotations (standard for simple setups)
    additionalScrapeConfigs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

grafana:
  enabled: true
  adminPassword: "admin"
  additionalsDataSources:
    - name: Jaeger
      type: jaeger
      url: http://jaeger-all-in-one-query.observability.svc.cluster.local:16686
      access: proxy
    - name: Loki
      type: loki
      url: http://loki-stack.observability.svc.cluster.local:3100
      access: proxy
