# ── Jaeger Helm Values ────────────────────────────────────────────────────────
# Chart: jaegertracing/jaeger

provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

allInOne:
  enabled: true
  persistence:
    enabled: false # in-memory for dev/hackathon
    
collector:
  service:
    otlp:
      http:
        enabled: true
        port: 4318
      grpc:
        enabled: true
        port: 4317

query:
  service:
    type: ClusterIP
    port: 16686

# Simple Jaeger all-in-one setup
