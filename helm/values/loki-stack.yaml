# ── Loki Stack Helm Values ────────────────────────────────────────────────────
# Chart: grafana/loki-stack

loki:
  enabled: true
  persistence:
    enabled: false # in-memory for dev/hackathon

promtail:
  enabled: true
  config:
    lokiAddress: http://loki-stack.observability.svc.cluster.local:3100/loki/api/v1/push
    snippets:
      extraScrapeConfigs: |
        - job_name: archaics-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_namespace]
              action: keep
              regex: archaics
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod_name
